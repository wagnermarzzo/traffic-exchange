<!DOCTYPE html>
<html>

<head>

<script>

let timer = 20;

function countdown(){

if(timer > 0){

document.getElementById("timer").innerText = timer;

timer--;

}else{

window.location="/reward/{{site_id}}"

}

}

setInterval(countdown,1000);

</script>

</head>

<body>

<h2>Assista ao site por 20 segundos</h2>

<h1 id="timer">20</h1>

<iframe src="{{site}}" width="100%" height="600"></iframe>

</body>

</html>
