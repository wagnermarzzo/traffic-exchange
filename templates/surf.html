<link rel="stylesheet" href="/static/style.css">

<h2>Autosurf</h2>

<p>Aguarde 15 segundos</p>

<h1 id="timer">15</h1>

<iframe src="{{site[1]}}" width="100%" height="600"></iframe>

<script>

let t = 15

setInterval(()=>{

t--

document.getElementById("timer").innerText = t

if(t==0){

window.location="/visit/{{site[0]}}"

}

},1000)

</script>
