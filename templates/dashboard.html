<link rel="stylesheet" href="/static/style.css">

<div class="sidebar">

<h2>Painel</h2>

<a href="/dashboard">Dashboard</a>
<a href="/surf">Autosurf</a>
<a href="/ranking">Ranking</a>

</div>

<div class="content">

<h1>Dashboard</h1>

<div class="card">
Créditos: {{credits}}
</div>

<div class="card">
Total Views: {{views}}
</div>

<h2>Adicionar Site</h2>

<form action="/addsite" method="post">

<input name="url" placeholder="https://site.com">

<button>Adicionar</button>

</form>

<h2>Seus sites</h2>

{% for site in sites %}

<div class="card">

{{site["url"]}}  
Views: {{site["views"]}}

</div>

{% endfor %}

<canvas id="stats"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

new Chart(document.getElementById("stats"),{

type:"bar",

data:{

labels:["Views"],

datasets:[{

label:"Total",

data:[{{views}}]

}]

}

})

</script>
