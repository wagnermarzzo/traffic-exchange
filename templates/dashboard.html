<link rel="stylesheet" href="/static/style.css">

<h1>Dashboard</h1>

<p>Créditos: {{credits}}</p>
<p>Total Views: {{views}}</p>

<a href="/surf">Iniciar Autosurf</a>

<h2>Adicionar site</h2>

<form action="/addsite" method="post">

<input name="url" placeholder="https://site.com" required>

<button>Adicionar</button>

</form>

<h2>Seus sites</h2>

{% for site in sites %}

<p>{{site["url"]}} | Views: {{site["views"]}}</p>

{% endfor %}
