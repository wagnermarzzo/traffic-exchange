<link rel="stylesheet" href="/static/style.css">

<h1>Dashboard</h1>

<div class="card">

<p>Créditos: {{credits}}</p>
<p>Total Views: {{views}}</p>

</div>

<a href="/surf">Iniciar Autosurf</a>

<br><br>

<h2>Adicionar Site</h2>

<form method="post" action="/addsite">

<input name="url" placeholder="https://site.com">

<button>Adicionar</button>

</form>

<h2>Seus Sites</h2>

{% for site in sites %}

<div class="card">

<p>{{site[2]}}</p>
<p>Views: {{site[3]}}</p>

</div>

{% endfor %}

<br>

<a href="/ranking">Ranking</a> |
<a href="/buy">Comprar Créditos</a>
