<!DOCTYPE html>
<html>

<head>

<title>Admin</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.sidebar{
width:230px;
height:100vh;
background:#020617;
position:fixed;
}

.sidebar h2{
text-align:center;
padding:20px;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

.main{
margin-left:230px;
padding:40px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:10px;
border-bottom:1px solid #334155;
}

input{
width:70px;
padding:5px;
}

button{
background:#22c55e;
border:none;
padding:6px 10px;
color:white;
cursor:pointer;
}

.ban{
background:#ef4444;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Admin</h2>

<a href="/admin">Usuários</a>

<a href="/analytics">Analytics</a>

<a href="/dashboard">Dashboard</a>

<a href="/logout">Sair</a>

</div>

<div class="main">

<h1>Painel Admin</h1>

<div class="card">

<table>

<tr>

<td>ID</td>
<td>Usuário</td>
<td>Créditos</td>
<td>Views</td>
<td>Adicionar Créditos</td>
<td>Banir</td>

</tr>

{% for u in users %}

<tr>

<td>{{u[0]}}</td>

<td>{{u[1]}}</td>

<td>{{u[3]}}</td>

<td>{{u[4]}}</td>

<td>

<form action="/admin/addcredits/{{u[0]}}" method="post">

<input name="amount" value="100">

<button>Adicionar</button>

</form>

</td>

<td>

<a href="/admin/ban/{{u[0]}}">

<button class="ban">Banir</button>

</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</body>

</html>
